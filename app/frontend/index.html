<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microservices DevOps Platform</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; max-width: 800px; }
    input, textarea, button { display: block; width: 100%; margin-top: 10px; padding: 10px; }
    button { cursor: pointer; }
    .task { border: 1px solid #ddd; padding: 12px; margin-top: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Microservices DevOps Platform</h1>
  <p>Create a task through the API.</p>

  <input id="title" placeholder="Task title" />
  <textarea id="description" placeholder="Task description"></textarea>
  <button onclick="createTask()">Create Task</button>

  <h2>Tasks</h2>
  <button onclick="loadTasks()">Refresh Tasks</button>
  <div id="tasks"></div>

  <script>
    const API_BASE = "/api";

    async function loadTasks() {
      const res = await fetch(`${API_BASE}/tasks`);
      const tasks = await res.json();
      const container = document.getElementById("tasks");
      container.innerHTML = "";

      tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task";
        div.innerHTML = `<strong>${task.title}</strong><br>${task.description}`;
        container.appendChild(div);
      });
    }

    async function createTask() {
      const title = document.getElementById("title").value;
      const description = document.getElementById("description").value;

      await fetch(`${API_BASE}/tasks`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ title, description })
      });

      document.getElementById("title").value = "";
      document.getElementById("description").value = "";
      loadTasks();
    }

    loadTasks();
  </script>
</body>
</html>
